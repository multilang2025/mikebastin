name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: PHP Lint (php ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3', '8.4' ]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint all PHP files
        run: find ai-site-assistant -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: cs2pr

      - name: Install PHPCS + WPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer:^3.9 \
            wp-coding-standards/wpcs:^3.1 \
            phpcsstandards/phpcsextra:^1.2 \
            phpcsstandards/phpcsutils:^1.0 \
            dealerdirect/phpcodesniffer-composer-installer:^1.0
          echo "$(composer -n config --global home)/vendor/bin" >> "$GITHUB_PATH"

      - name: Run PHPCS
        run: phpcs --standard=phpcs.xml.dist -q --report=full --report-checkstyle=./phpcs-report.xml

      - name: Annotate PR with PHPCS findings
        if: always()
        run: cs2pr ./phpcs-report.xml
